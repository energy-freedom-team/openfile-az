# openfile-az — self-hosted docker-compose
#
# Usage:
#   cd openfile-az
#   docker compose -f web/docker/docker-compose.yml up -d
#
# Then open http://localhost:8080
#
# The container serves only static files. No backend, no database, no
# volumes holding user data — everything runs in your browser.

services:
  openfile-az:
    build:
      context: ../..
      dockerfile: web/docker/Dockerfile
    image: openfile-az:local
    container_name: openfile-az
    restart: unless-stopped
    ports:
      - "${OPENFILE_PORT:-8080}:80"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
