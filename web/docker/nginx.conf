# openfile-az static-site nginx config
# Gzip everything worth compressing, add the Pyodide-friendly COOP/COEP
# headers, and cache Pyodide aggressively (immutable versioned assets).

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Pyodide recommends these headers. credentialless avoids breaking cross-origin
  # resources while still enabling SharedArrayBuffer in modern browsers.
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "credentialless" always;

  # Security baseline
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  # Privacy: declare no connections back to us once loaded.
  # (CSP kept permissive for the hosted Pyodide CDN fallback; self-hosters
  # can tighten this further once vendor/pyodide is bundled.)
  add_header Content-Security-Policy
    "default-src 'self'; \
     script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; \
     style-src 'self' 'unsafe-inline'; \
     img-src 'self' data:; \
     font-src 'self' data:; \
     connect-src 'self' https://cdn.jsdelivr.net; \
     worker-src 'self' blob:; \
     frame-ancestors 'none';" always;

  # MIME types Pyodide / openpyxl / reportlab need
  types {
    application/wasm                  wasm;
    text/javascript                   js mjs;
    application/json                  json map;
    application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
    application/pdf                   pdf;
  }

  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/wasm image/svg+xml;
  gzip_min_length 1024;
  gzip_vary on;

  # Pyodide vendor assets are versioned; cache forever
  location /vendor/pyodide/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # core.zip changes every release — cache briefly
  location = /core.zip {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
